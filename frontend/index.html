<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>업무관리 앱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-2xl mx-auto py-10 px-4">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">업무관리</h1>

    <form id="taskForm" class="flex gap-2 mb-8">
      <input
        id="taskTitleInput"
        type="text"
        placeholder="새 업무를 입력하세요"
        class="flex-1 border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <button
        type="submit"
        class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700"
      >
        추가
      </button>
    </form>

    <div id="taskList" class="space-y-3"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
